<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KPSS/DGS Soru Çözüm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 KPSS/DGS Soru Bankası</h1>
            <p>Seviyene göre soru çöz, kendini geliştir!</p>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label>📊 Seviye</label>
                <select id="levelSelect">
                    <option value="0">0 - Dört İşlem</option>
                    <option value="1">1 - Temel Kavramlar</option>
                    <option value="2">2 - Bölünebilme / Asallar / EBOB-EKOK</option>
                    <option value="3">3 - Kesirler</option>
                    <option value="4">4 - Üslü Sayılar</option>
                    <option value="5">5 - Köklü Sayılar</option>
                    <option value="6">6 - Çarpanlara Ayırma</option>
                    <option value="7">7 - Denklemler</option>
                    <option value="8">8 - Eşitsizlikler</option>
                    <option value="9">9 - Mutlak Değer</option>
                    <option value="10">10 - Oran-Orantı</option>
                    <option value="11">11 - Problemler</option>
                    <option value="12">12 - Kümeler</option>
                    <option value="13">13 - Permütasyon</option>
                    <option value="14">14 - Kombinasyon</option>
                    <option value="15">15 - Olasılık</option>
                    <option value="16">16 - İstatistik</option>
                    <option value="17">17 - Mantık</option>
                    <option value="18">18 - Geometri</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>⚡ Zorluk</label>
                <div class="difficulty-buttons">
                    <button data-diff="kolay" class="diff-btn">Kolay</button>
                    <button data-diff="orta" class="diff-btn active">Orta</button>
                    <button data-diff="zor" class="diff-btn">Zor</button>
                    <button data-diff="cok_zor" class="diff-btn">Çok Zor</button>
                </div>
            </div>

            <div class="setting-group">
                <label>📂 Konu</label>
                <select id="topicSelect">
                    <option value="">Tüm Konular</option>
                </select>
            </div>

            <button id="newQuestionsBtn" class="new-questions-btn">🎲 Yeni Sorular</button>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Doğru</span>
                <span class="stat-value" id="correctCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Yanlış</span>
                <span class="stat-value" id="wrongCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Başarı</span>
                <span class="stat-value" id="successRate">0%</span>
            </div>
        </div>

        <div id="questionsArea" class="questions-area"></div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
